
spring.application.name=lera-backend
server.port=${PORT:8080}


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lera_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Jahdiebube}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000


spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false


lera.jwt.secret=${JWT_SECRET:semicolon-africa-lera-emergency-response-app-2024-secret-key!!}
lera.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:259200000}
lera.jwt.refresh-expiration-ms=${REFRESH_TOKEN_EXPIRATION_MS:604800000}


logging.level.com.lera.security=DEBUG

lera.socketio.host=0.0.0.0
lera.socketio.port=${SOCKETIO_PORT:9092}


lera.firebase.credentials-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

lera.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,https://*.vercel.app}


logging.level.com.lera=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n
